<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Spark Repair Estimator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-slate-100">

  <!-- HEADER -->
  <div class="bg-slate-900 text-white px-4 pt-6 pb-5 sticky top-0 z-10 shadow-lg">

    <!-- TOP ROW -->
    <div class="flex justify-between items-start">
      <div>
        <p class="text-xs text-orange-400 font-bold tracking-widest uppercase">
          Spark Repair Estimator
        </p>
        <p class="text-4xl font-bold mt-1" id="total-display">$0</p>
        <p class="text-sm text-slate-400 mt-1">New Estimate</p>
<button onclick="exportToExcel()"
  class="mt-3 px-4 py-2 bg-orange-500 text-white text-sm font-bold rounded-xl">
  Export to Excel ↓
</button>
      </div>

      <!-- PROGRESS CIRCLE -->
      <div class="flex flex-col items-center">
        <div class="relative w-14 h-14">
          <svg class="w-full h-full -rotate-90" viewBox="0 0 36 36">
            <!-- Background circle -->
            <circle cx="18" cy="18" r="15.9"
              fill="none" stroke="#1E293B" stroke-width="3"/>
            <!-- Progress circle -->
            <circle cx="18" cy="18" r="15.9"
              fill="none" stroke="#EA580C" stroke-width="3"
              stroke-dasharray="0 100"
              stroke-linecap="round"
              id="progress-circle"/>
          </svg>
          <span class="absolute inset-0 flex items-center justify-center
            text-xs font-bold text-orange-400" id="progress-text">0%</span>
        </div>
        <p class="text-xs text-slate-500 mt-1" id="progress-label">0 / 0</p>
      </div>
    </div>

    <!-- PROGRESS BAR -->
    <div class="mt-3 h-1.5 bg-slate-700 rounded-full overflow-hidden">
      <div class="h-full bg-orange-500 rounded-full transition-all duration-500"
        id="progress-bar" style="width: 0%"></div>
    </div>

  </div>

  <!-- MAIN CONTENT -->
  <div id="app" class="px-4 py-4 pb-10"></div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="script.js"></script>
</body>
</html>
